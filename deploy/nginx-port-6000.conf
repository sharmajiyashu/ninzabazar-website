# Next.js cannot use port 6000 (X11 reserved).
# This Nginx config listens on 6000 and forwards to Next.js on 6100.
#
# Install on Ubuntu/Debian:
#   sudo apt update && sudo apt install -y nginx
#   sudo cp deploy/nginx-port-6000.conf /etc/nginx/sites-available/ninjabazaar
#   sudo ln -sf /etc/nginx/sites-available/ninjabazaar /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo ufw allow 6000

server {
    listen 6000;
    listen [::]:6000;
    server_name _;

    client_max_body_size 50M;

    location / {
        # Must match PORT in .env (default 6100)
        proxy_pass http://127.0.0.1:6100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
